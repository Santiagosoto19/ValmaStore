<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - Valma</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fas fa-sparkles"></i>
                <span>VALMA</span>
            </a>

            <div class="nav-links">
                <a href="/" class="nav-link"><i class="fas fa-store"></i> Tienda</a>
                <a href="/carrito" class="nav-link cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
                <div class="user-menu" id="userMenu">
                    <a href="/login" class="nav-link">Iniciar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="orders-page">
        <div class="container">
            <h1><i class="fas fa-box"></i> Mis Pedidos</h1>

            <div class="orders-content" id="ordersContent">
                <!-- Los pedidos se cargan dinámicamente -->
            </div>
        </div>
    </main>


    <!-- Modal de detalle de pedido -->
    <div class="modal" id="orderModal">
        <div class="modal-content modal-lg">
            <button class="modal-close" onclick="closeOrderModal()"><i class="fas fa-times"></i></button>
            <div class="modal-body" id="orderModalBody">
                <!-- Contenido se carga dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/product-image.js"></script>
    <script src="/js/main.js"></script>
    <script>
        // Verificar autenticación
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = '/login';
                return;
            }
            updateUserMenu();
            loadOrders();
        });

        // Cargar pedidos
        async function loadOrders() {
            const ordersContent = document.getElementById('ordersContent');

            try {
                const response = await fetch('/api/orders/my-orders', {
                    credentials: 'include'
                });
                const data = await response.json();

                if (!data.success || !data.data || data.data.length === 0) {
                    ordersContent.innerHTML = `
                        <div class="empty-orders">
                            <i class="fas fa-box-open"></i>
                            <h2>No tienes pedidos aún</h2>
                            <p>¡Realiza tu primera compra y descubre nuestros productos!</p>
                            <a href="/" class="btn btn-primary">Ver Productos</a>
                        </div>
                    `;
                    return;
                }

                const orders = data.data;

                ordersContent.innerHTML = `
                    <div class="orders-list">
                        ${orders.map(order => `
                            <div class="order-card" data-order-id="${order.id}">
                                <div class="order-header">
                                    <div class="order-info">
                                        <span class="order-number">#${order.order_number}</span>
                                        <span class="order-date">${formatDate(order.created_at)}</span>
                                    </div>
                                    <span class="order-status status-${order.status}">${getStatusLabel(order.status)}</span>
                                </div>
                                <div class="order-body">
                                    <div class="order-details">
                                        <p><i class="fas fa-map-marker-alt"></i> ${order.shipping_city}</p>
                                        <p><i class="fas fa-money-bill"></i> ${formatPrice(order.total_amount)}</p>
                                    </div>
                                    <div class="order-actions">
                                        <button class="btn btn-outline btn-sm" onclick="viewOrderDetails(${order.id})">
                                            Ver Detalles
                                        </button>
                                        ${order.whatsapp_link ? `
                                            <a href="${order.whatsapp_link}" target="_blank" class="btn btn-whatsapp btn-sm">
                                                <i class="fab fa-whatsapp"></i> Contactar
                                            </a>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

            } catch (error) {
                console.error('Error cargando pedidos:', error);
                ordersContent.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error al cargar los pedidos. Intenta de nuevo.</p>
                    </div>
                `;
            }
        }

        // Ver detalles del pedido
        async function viewOrderDetails(orderId) {
            try {
                const response = await fetch(`/api/orders/${orderId}`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (!data.success) {
                    showToast('Error al cargar detalles del pedido', 'error');
                    return;
                }

                const { order, items, statusHistory } = data.data;

                document.getElementById('orderModalBody').innerHTML = `
                    <div class="order-detail">
                        <div class="order-detail-header">
                            <h2>Pedido #${order.order_number}</h2>
                            <span class="order-status status-${order.status}">${getStatusLabel(order.status)}</span>
                        </div>

                        <div class="order-detail-info">
                            <div class="info-section">
                                <h4>Información de Envío</h4>
                                <p><strong>Dirección:</strong> ${order.shipping_address}</p>
                                <p><strong>Ciudad:</strong> ${order.shipping_city}</p>
                                <p><strong>Teléfono:</strong> ${order.shipping_phone}</p>
                                ${order.notes ? `<p><strong>Notas:</strong> ${order.notes}</p>` : ''}
                            </div>

                            <div class="info-section">
                                <h4>Resumen</h4>
                                <p><strong>Fecha:</strong> ${formatDate(order.created_at)}</p>
                                <p><strong>Total:</strong> ${formatPrice(order.total_amount)}</p>
                            </div>
                        </div>

                        <div class="order-items-detail">
                            <h4>Productos</h4>
                            <div class="order-items-list">
                                ${items.map(item => `
                                    <div class="order-item-row">
                                        <img src="${resolveProductImage(item.image_url)}" alt="${item.product_name}">
                                        <div class="item-info">
                                            <p class="item-name">${item.product_name}</p>
                                            <p class="item-brand">${item.brand_name || 'Sin marca'}</p>
                                        </div>
                                        <div class="item-quantity">x${item.quantity}</div>
                                        <div class="item-price">${formatPrice(item.total_price)}</div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="order-total">
                                <span>Total</span>
                                <span>${formatPrice(order.total_amount)}</span>
                            </div>
                        </div>

                        ${order.whatsapp_link ? `
                            <div class="order-actions-footer">
                                <a href="${order.whatsapp_link}" target="_blank" class="btn btn-whatsapp">
                                    <i class="fab fa-whatsapp"></i> Contactar por WhatsApp
                                </a>
                            </div>
                        ` : ''}
                    </div>
                `;

                document.getElementById('orderModal').classList.add('active');

            } catch (error) {
                showToast('Error al cargar detalles', 'error');
            }
        }

        // Cerrar modal
        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        // Obtener etiqueta de estado
        function getStatusLabel(status) {
            const labels = {
                'pending': 'Pendiente',
                'confirmed': 'Confirmado',
                'paid': 'Pagado',
                'processing': 'En Proceso',
                'shipped': 'Enviado',
                'delivered': 'Entregado',
                'cancelled': 'Cancelado'
            };
            return labels[status] || status;
        }

        // Formatear fecha
        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('es-CO', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Formatear precio
        function formatPrice(price) {
            return new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 0
            }).format(price);
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('orderModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('orderModal')) {
                closeOrderModal();
            }
        });
    </script>
</body>
</html>
