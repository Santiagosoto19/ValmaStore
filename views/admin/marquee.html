<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Marquee - Valma</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <a href="/" class="admin-logo">
                <i class="fas fa-sparkles"></i>
                <span>VALMA</span>
            </a>
            <span class="admin-badge">Admin</span>
        </div>

        <nav class="sidebar-nav">
            <a href="/admin" class="nav-item">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin/productos" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Productos</span>
            </a>
            <a href="/admin/pedidos" class="nav-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Pedidos</span>
            </a>
            <a href="/admin/marquee" class="nav-item active">
                <i class="fas fa-bullhorn"></i>
                <span>Banner Marquee</span>
            </a>
            <a href="/" class="nav-item">
                <i class="fas fa-store"></i>
                <span>Ver Tienda</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button type="button" class="nav-item" id="btnAdminLogout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar Sesión</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <h1>Banner Marquee</h1>
            <div class="header-user">
                <span id="userName">Administrador</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </header>

        <div class="admin-content marquee-admin-page">
            <!-- Preview Card -->
            <div class="admin-section marquee-admin-section">
                <div class="section-header">
                    <h2><i class="fas fa-eye"></i> Vista Previa</h2>
                </div>
                <div class="marquee-preview-live" id="marqueePreviewLive">
                    <div class="marquee-content" id="marqueePreviewContent"></div>
                </div>
            </div>

            <!-- Settings Grid -->
            <div class="dashboard-grid">
                <!-- Messages Management -->
                <div class="admin-section dashboard-orders">
                    <div class="section-header">
                        <h2><i class="fas fa-list"></i> Mensajes Activos</h2>
                    </div>
                    <div class="marquee-messages-admin" id="marqueeMessagesAdmin"></div>
                    <div class="marquee-add-form">
                        <input type="text" id="newMarqueeMessage" placeholder="Nuevo mensaje..." maxlength="120">
                        <button type="button" class="btn btn-primary" id="btnAddMarqueeMessage">
                            <i class="fas fa-plus"></i> Agregar
                        </button>
                    </div>
                </div>

                <!-- Settings -->
                <div class="admin-section dashboard-marquee">
                    <div class="section-header">
                        <h2><i class="fas fa-cog"></i> Configuración</h2>
                    </div>
                    <div class="marquee-settings">
                        <div class="setting-row">
                            <label for="marqueeColorPicker">Color de fondo</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="marqueeColorPicker" value="#c0006a">
                                <span id="marqueeColorValue">#c0006a</span>
                            </div>
                        </div>
                        <div class="setting-row">
                            <label>Velocidad de desplazamiento</label>
                            <div class="speed-selector">
                                <button type="button" class="speed-btn" data-speed="slow">Lento</button>
                                <button type="button" class="speed-btn active" data-speed="normal">Normal</button>
                                <button type="button" class="speed-btn" data-speed="fast">Rápido</button>
                            </div>
                        </div>
                        <div class="setting-actions">
                            <button type="button" class="btn btn-secondary" id="btnResetMarqueeDefaults">
                                <i class="fas fa-undo"></i> Restaurar defaults
                            </button>
                            <button type="button" class="btn btn-primary" id="btnSaveMarqueeSettings">
                                <i class="fas fa-save"></i> Guardar cambios
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/admin-common.js"></script>
    <script src="/js/admin-marquee.js"></script>
</body>
</html>
